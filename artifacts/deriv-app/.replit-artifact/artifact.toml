kind = "web"
previewPath = "/"
title = "Deriv OAuth App"
version = "1.0.0"
id = "artifacts/deriv-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19707

[services.development]
run = "pnpm --filter @workspace/deriv-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deriv-app", "run", "build" ]
publicDir = "artifacts/deriv-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19707"
BASE_PATH = "/"
